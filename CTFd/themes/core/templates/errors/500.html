{% extends "base.html" %}

{% block content %}
  <div class="cs-error">
    <div class="cs-error-code" data-code="500"><span>500</span></div>
    <p class="cs-error-stamp">// system fracture</p>
    <h1 class="cs-error-title">{{ error }}</h1>
    <p class="cs-error-sub">— something inside the machine broke. operators have been notified. —</p>
    <div class="cs-error-actions">
      <a href="/" class="btn btn-primary"><i class="fas fa-home me-1"></i> Return to base</a>
    </div>
  </div>

  <style>
    .cs-error { max-width: 720px; margin: 5rem auto; padding: 3rem 2rem; text-align: center; position: relative; }
    .cs-error-code {
      font-family: var(--f-title);
      font-size: clamp(7rem, 18vw, 14rem);
      line-height: 0.85;
      color: var(--red);
      text-shadow: 0 0 60px rgba(139,26,26,0.4), 4px 4px 0 rgba(0,0,0,0.7);
      position: relative;
      animation: cs-err-flicker 1.6s infinite;
    }
    @keyframes cs-err-flicker {
      0%, 80%, 100% { opacity: 1; }
      82%, 84%      { opacity: 0.45; }
      86%           { opacity: 1; }
    }
    .cs-error-code::before, .cs-error-code::after { content: attr(data-code); position: absolute; inset: 0; pointer-events: none; }
    .cs-error-code::before { color: var(--teal); transform: translate(-3px, 0); mix-blend-mode: screen; opacity: 0.4; }
    .cs-error-code::after  { color: var(--red);  transform: translate(3px, 0);  mix-blend-mode: screen; opacity: 0.3; }
    .cs-error-stamp { font-family: var(--f-mono); letter-spacing: 0.3em; color: var(--red); font-size: 0.85rem; margin: 1.2rem 0 0.4rem; text-transform: uppercase; }
    .cs-error-title { font-family: var(--f-title) !important; font-size: clamp(1.6rem, 4vw, 2.6rem) !important; color: var(--bone) !important; letter-spacing: 0.06em !important; }
    .cs-error-sub { font-family: var(--f-hand); color: var(--muted); font-size: 0.9rem; letter-spacing: 0.1em; margin: 0.8rem 0 2rem; }
    .cs-error-actions { display: flex; gap: 0.6rem; justify-content: center; }
  </style>
{% endblock %}
