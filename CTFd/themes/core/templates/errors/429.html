{% extends "base.html" %}

{% block content %}
  <div class="cs-error">
    <div class="cs-error-code" data-code="429"><span>429</span></div>
    <p class="cs-error-stamp">// throttle engaged</p>
    <h1 class="cs-error-title">{% trans %}Too many requests{% endtrans %}</h1>
    <p class="cs-error-sub">— {% trans %}Please slow down!{% endtrans %} the server is breathing —</p>
    <p class="cs-mono" style="color:var(--muted); font-size:0.78rem; letter-spacing:0.18em;">{% trans %}429 Too Many Requests{% endtrans %}</p>
  </div>

  <style>
    .cs-error { max-width: 720px; margin: 5rem auto; padding: 3rem 2rem; text-align: center; position: relative; }
    .cs-error-code {
      font-family: var(--f-title);
      font-size: clamp(7rem, 18vw, 14rem);
      line-height: 0.85;
      color: #c0a050;
      text-shadow: 0 0 60px rgba(212,168,67,0.3), 4px 4px 0 rgba(0,0,0,0.7);
      position: relative;
    }
    .cs-error-code::before, .cs-error-code::after { content: attr(data-code); position: absolute; inset: 0; pointer-events: none; }
    .cs-error-code::before { color: var(--teal); transform: translate(-3px, 0); mix-blend-mode: screen; opacity: 0.4; }
    .cs-error-code::after  { color: var(--red);  transform: translate(3px, 0);  mix-blend-mode: screen; opacity: 0.3; }
    .cs-error-stamp { font-family: var(--f-mono); letter-spacing: 0.3em; color: #c0a050; font-size: 0.85rem; margin: 1.2rem 0 0.4rem; text-transform: uppercase; }
    .cs-error-title { font-family: var(--f-title) !important; font-size: clamp(1.6rem, 4vw, 2.6rem) !important; color: var(--bone) !important; letter-spacing: 0.06em !important; }
    .cs-error-sub { font-family: var(--f-hand); color: var(--muted); font-size: 0.9rem; letter-spacing: 0.1em; margin: 0.8rem 0 1rem; }
  </style>
{% endblock %}
