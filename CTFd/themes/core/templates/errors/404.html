{% extends "base.html" %}

{% block content %}
  <div class="cs-error">
    <div class="cs-error-code" data-code="404"><span>404</span></div>
    <p class="cs-error-stamp">// signal lost</p>
    <h1 class="cs-error-title">{% trans %}File not found{% endtrans %}</h1>
    <p class="cs-error-sub">— this dossier does not exist. or it never did. —</p>
    <div class="cs-error-actions">
      <a href="/" class="btn btn-primary"><i class="fas fa-home me-1"></i> Return to base</a>
    </div>
  </div>

  <style>
    .cs-error {
      max-width: 720px;
      margin: 5rem auto;
      padding: 3rem 2rem;
      text-align: center;
      position: relative;
    }
    .cs-error-code {
      font-family: var(--f-title);
      font-size: clamp(7rem, 18vw, 14rem);
      line-height: 0.85;
      color: var(--teal);
      text-shadow: 0 0 60px var(--teal-glow), 4px 4px 0 rgba(0,0,0,0.7);
      position: relative;
      letter-spacing: 0.02em;
      animation: cs-err-glitch 3.6s infinite;
    }
    .cs-error-code::before, .cs-error-code::after {
      content: attr(data-code);
      position: absolute; inset: 0;
      pointer-events: none;
    }
    .cs-error-code::before { color: var(--red); transform: translate(-3px, 0); mix-blend-mode: screen; opacity: 0.6; animation: cs-err-shift 2.4s infinite steps(8); }
    .cs-error-code::after  { color: var(--teal); transform: translate(3px, 0);  mix-blend-mode: screen; opacity: 0.4; animation: cs-err-shift 2.4s infinite reverse steps(8); }
    @keyframes cs-err-shift {
      0%, 100% { transform: translate(0,0); }
      40%      { transform: translate(-2px,1px); }
      60%      { transform: translate(2px,-1px); }
    }
    @keyframes cs-err-glitch {
      0%, 92%, 100% { filter: none; }
      94%           { filter: hue-rotate(40deg) saturate(1.6); transform: translateX(2px); }
      96%           { filter: invert(0.1); transform: translateX(-2px); }
    }
    .cs-error-stamp {
      font-family: var(--f-mono);
      letter-spacing: 0.3em;
      color: var(--red);
      font-size: 0.85rem;
      margin: 1.2rem 0 0.4rem;
      text-transform: uppercase;
    }
    .cs-error-title {
      font-family: var(--f-title) !important;
      font-size: clamp(1.6rem, 4vw, 2.6rem) !important;
      color: var(--bone) !important;
      letter-spacing: 0.06em !important;
      text-shadow: 0 0 30px rgba(60,179,113,0.18);
    }
    .cs-error-sub {
      font-family: var(--f-hand);
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      margin: 0.8rem 0 2rem;
    }
    .cs-error-actions { display: flex; gap: 0.6rem; justify-content: center; }
  </style>
{% endblock %}
