{% extends "base.html" %}

{% block content %}

<style>
  /* ── Challenges page specific ── */
  .challenges-header {
    position: relative;
    padding: 3.5rem 0 2.2rem;
    background: var(--deep);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 2.5rem;
  }
  .challenges-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 100% at 50% 110%, rgba(60,179,113,0.07) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 22px, rgba(200,216,196,0.018) 22px, rgba(200,216,196,0.018) 23px);
  }
  .challenges-header h1 {
    font-family: var(--f-title) !important;
    font-size: clamp(2rem, 5vw, 3.5rem) !important;
    letter-spacing: 0.08em;
    text-shadow: 0 0 50px rgba(60,179,113,0.3), 2px 3px 0 rgba(0,0,0,0.7);
    position: relative;
    z-index: 1;
  }
  /* animated teal underline */
  .challenges-header h1::after {
    content: '';
    display: block;
    width: 60px;
    height: 2px;
    background: var(--teal);
    margin: 0.5rem auto 0;
    box-shadow: 0 0 10px var(--teal-glow);
  }

  .challenges-subtitle {
    font-family: var(--f-hand);
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
    margin-top: 0.4rem;
  }

  /* category section gap */
  .category-section { padding-top: 2.5rem; }

  /* override challenge card for this page */
  .challenge-button {
    min-height: 115px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    /* subtle top-left corner scratch */
    background-image: linear-gradient(135deg, rgba(60,179,113,0.06) 0%, transparent 30%) !important;
  }
  .challenge-button .challenge-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
    width: 100%;
  }

  /* empty state */
  .challenges-empty {
    text-align: center;
    padding: 5rem 0;
    font-family: var(--f-hand);
    color: var(--muted);
    font-size: 1.1rem;
    letter-spacing: 0.06em;
  }
</style>

<div class="challenges-header text-center">
  <div class="container">
    <h1>{% trans %}Challenges{% endtrans %}</h1>
    <p class="challenges-subtitle">— access restricted — prove your worth —</p>
  </div>
</div>

<div class="container">
  <div class="row">
    <div class="col-md-12">
      {% include "components/errors.html" %}
    </div>
  </div>

  <div
    x-data="ChallengeBoard"
    @load-challenges.window="loadChallenges()"
    @load-challenge.window="loadChallenge($event.detail)"
  >
    <div
        x-ref="challengeWindow" id="challenge-window" class="modal fade" tabindex="-1" role="dialog" x-data=""
        x-html="$store.challenge.data.view"
    ></div>

    <div x-show="!loaded">
      <div class="min-vh-50 d-flex align-items-center">
        <div class="text-center w-100" style="padding: 4rem 0;">
          <i class="fas fa-circle-notch fa-spin fa-3x fa-fw spinner"></i>
          <p style="margin-top:1rem; font-family:var(--f-hand); color:var(--muted); font-size:0.82rem; letter-spacing:0.12em;">
            loading...
          </p>
        </div>
      </div>
    </div>

    <div x-show="loaded">
      <template x-for="(category, idx) in getCategories()" :key="idx">
        <div class="category-section">
          <div class="category-header mb-3">
            <h3 x-text="category"></h3>
          </div>
          <div class="category-challenges">
            <div class="challenges-row row">
              <template x-for="(c, idx) in getChallenges(category)" :key="c.id">
                <div class="col-sm-6 col-md-4 col-lg-3 my-3">
                  <button
                      class="challenge-button btn btn-dark w-100 h-100"
                      :class="[
                        c.solved_by_me ? 'challenge-solved' : '',
                        ...c.tags.map((tag) => `tag-${tag.value.replace(/ /g, '-')}`),
                      ];"
                      :value="c.id" @click="loadChallenge(c.id)"
                  >
                    <div class="challenge-inner my-3">
                      <p x-text="c.name"></p>
                      <span x-text="c.value"></span>
                    </div>
                  </button>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
  {{ Assets.js("assets/js/challenges.js") }}
{% endblock %}
