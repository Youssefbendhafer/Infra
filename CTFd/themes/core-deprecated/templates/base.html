<!DOCTYPE html>
<html lang="en">
<head>
	<title>{{ Configs.ctf_name }}</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="shortcut icon" href="{{ Configs.ctf_small_icon }}" type="image/x-icon">
	
	<!-- Theme Fonts -->
	<link rel="stylesheet" href="{{ url_for('views.themes', path='css/fonts.css') }}">
	
	<!-- Core CTFd Styles -->
	<link rel="stylesheet" href="{{ url_for('views.themes', path='css/main.css') }}">
	<link rel="stylesheet" href="{{ url_for('views.themes', path='css/core.css') }}">
	
	<!-- Theme CSS -->
	<link rel="stylesheet" href="{{ url_for('views.themes', path='css/naruto-ctfd-complete.css') }}">
	<link rel="stylesheet" href="{{ url_for('views.themes', path='css/challenge-theme.css') }}">
	<link rel="stylesheet" href="{{ url_for('views.themes', path='css/codemirror-theme.css') }}">
	<link rel="stylesheet" href="{{ url_for('views.themes', path='css/naruto-extras.css') }}">
	
	{% block stylesheets %}
	{% endblock %}

	{{ Plugins.styles }}
	
	<!-- Pixel Pioneers Theme - Blue & Purple -->
	<style>
		/* Pixel Pioneers Color Scheme */
		:root {
			--cyber-cyan: #00d9ff;
			--cyber-magenta: #ff00ff;
			--cyber-purple: #8b00ff;
			--cyber-blue: #0066ff;
			--cyber-dark: #0a0a14;
			--cyber-darker: #050508;
			--cyber-grid: #1a1a2e;
			--cyber-text: #e0f4ff;
		}
		
		/* Body - Circuit Board Background */
		body {
			background-color: var(--cyber-dark);
			background-image: 
				linear-gradient(rgba(0, 217, 255, 0.03) 1px, transparent 1px),
				linear-gradient(90deg, rgba(0, 217, 255, 0.03) 1px, transparent 1px);
			background-size: 20px 20px;
			color: var(--cyber-text);
			font-family: "Lato", "LatoOffline", sans-serif;
		}
		
		/* Background overlay effect */
		body::before {
			content: "";
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background-image: 
				radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.05) 0%, transparent 50%),
				radial-gradient(circle at 80% 80%, rgba(255, 0, 255, 0.05) 0%, transparent 50%);
			pointer-events: none;
			z-index: 0;
		}
		
		/* Background Image - Only on Index Page */
		body.index-page {
			background-image: 
				url('/files/20ff226dc5471be3527a90927f1adfab/Lava_Pro_Grunge_2_1.png'),
				linear-gradient(rgba(0, 217, 255, 0.03) 1px, transparent 1px),
				linear-gradient(90deg, rgba(0, 217, 255, 0.03) 1px, transparent 1px);
			background-attachment: fixed, fixed, fixed;
			background-position: center center, 0 0, 0 0;
			background-repeat: no-repeat, repeat, repeat;
			background-size: cover, 20px 20px, 20px 20px;
		}
		
		/* Main Content */
		main {
			min-height: calc(100vh - 200px);
			padding-top: 4rem;
			position: relative;
			z-index: 1;
		}
		
		/* Container */
		.container {
			background-color: transparent;
		}
		
		/* Footer */
		.footer {
			background: linear-gradient(135deg, rgba(10, 10, 20, 0.95) 0%, rgba(26, 26, 46, 0.95) 100%);
			border-top: 2px solid var(--cyber-cyan);
			color: var(--cyber-text);
			padding: 2rem 0;
			backdrop-filter: blur(10px);
			position: relative;
			z-index: 1;
		}
		
		.footer a {
			color: var(--cyber-cyan) !important;
			transition: color 0.3s ease;
		}
		
		.footer a:hover {
			color: var(--cyber-magenta) !important;
			text-shadow: 0 0 10px rgba(255, 0, 255, 0.6);
		}
		
		/* Scrollbar */
		::-webkit-scrollbar {
			width: 12px;
		}
		
		::-webkit-scrollbar-track {
			background: var(--cyber-darker);
		}
		
		::-webkit-scrollbar-thumb {
			background: linear-gradient(135deg, var(--cyber-cyan), var(--cyber-magenta));
			border-radius: 0;
		}
		
		::-webkit-scrollbar-thumb:hover {
			background: linear-gradient(135deg, var(--cyber-magenta), var(--cyber-cyan));
		}
		
		/* Buttons */
		.btn {
			border: 2px solid rgba(0, 217, 255, 0.3) !important;
			background: linear-gradient(135deg, rgba(10, 10, 20, 0.8) 0%, rgba(26, 26, 46, 0.8) 100%) !important;
			color: var(--cyber-text) !important;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 1px;
			transition: all 0.3s ease;
			border-radius: 0;
			font-family: "Rajdhani", sans-serif;
		}
		
		.btn:hover {
			background: linear-gradient(135deg, var(--cyber-cyan) 0%, var(--cyber-blue) 100%) !important;
			border-color: var(--cyber-cyan) !important;
			color: #000 !important;
			transform: translateY(-2px);
			box-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
		}
		
		.btn:active {
			transform: translateY(0);
		}
		
		.btn-primary {
			background: linear-gradient(135deg, var(--cyber-cyan) 0%, var(--cyber-blue) 100%) !important;
			color: #000 !important;
			border-color: var(--cyber-cyan) !important;
			box-shadow: 0 0 20px rgba(0, 217, 255, 0.4);
		}
		
		.btn-primary:hover {
			background: linear-gradient(135deg, var(--cyber-blue) 0%, var(--cyber-cyan) 100%) !important;
			box-shadow: 0 0 30px rgba(0, 217, 255, 0.6);
		}
		
		/* Form Inputs */
		.form-control {
			background: rgba(10, 10, 20, 0.8) !important;
			border: 2px solid rgba(0, 217, 255, 0.3) !important;
			color: var(--cyber-text) !important;
			border-radius: 0;
			font-family: "Roboto Mono", monospace;
		}
		
		.form-control:focus {
			border-color: var(--cyber-cyan) !important;
			box-shadow: 
				0 0 0 0.2rem rgba(0, 217, 255, 0.25),
				inset 0 0 20px rgba(0, 217, 255, 0.1) !important;
			background: rgba(10, 10, 20, 0.95) !important;
			outline: none;
		}
		
		.form-control::placeholder {
			color: rgba(224, 244, 255, 0.4);
		}
		
		/* Cards */
		.card {
			background: linear-gradient(135deg, var(--cyber-dark) 0%, var(--cyber-grid) 100%);
			border: 2px solid rgba(0, 217, 255, 0.3);
			border-radius: 0;
			box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
			position: relative;
		}
		
		.card::before {
			content: "";
			position: absolute;
			top: 0;
			left: 0;
			width: 3px;
			height: 100%;
			background: linear-gradient(180deg, var(--cyber-cyan), var(--cyber-magenta));
		}
		
		.card-header {
			background: linear-gradient(135deg, var(--cyber-grid) 0%, var(--cyber-dark) 100%);
			border-bottom: 2px solid var(--cyber-cyan);
			color: var(--cyber-cyan);
			font-weight: 700;
			font-family: "Rajdhani", sans-serif;
			text-transform: uppercase;
			letter-spacing: 2px;
		}
		
		.card-body {
			color: var(--cyber-text);
		}
		
		/* Tables */
		.table {
			color: var(--cyber-text);
			background: linear-gradient(135deg, var(--cyber-dark) 0%, var(--cyber-grid) 100%);
		}
		
		.table thead {
			background: linear-gradient(135deg, var(--cyber-grid) 0%, var(--cyber-dark) 100%);
			border-bottom: 2px solid var(--cyber-cyan);
		}
		
		.table thead th {
			color: var(--cyber-cyan);
			font-weight: 700;
			font-family: "Rajdhani", sans-serif;
			text-transform: uppercase;
			letter-spacing: 2px;
			border: none;
			text-shadow: 0 0 10px rgba(0, 217, 255, 0.6);
		}
		
		.table tbody tr {
			border-bottom: 1px solid rgba(0, 217, 255, 0.2);
			transition: all 0.3s ease;
		}
		
		.table tbody tr:hover {
			background: rgba(0, 217, 255, 0.05);
			transform: translateX(5px);
		}
		
		.table tbody td {
			border: none;
		}
		
		/* Alerts */
		.alert {
			border-radius: 0;
			border-width: 2px;
			font-weight: 600;
			background: rgba(10, 10, 20, 0.95);
			border-left: 4px solid var(--cyber-cyan);
		}
		
		.alert-success {
			border-left-color: #00ff88;
			color: #00ff88;
		}
		
		.alert-danger {
			border-left-color: #ff006e;
			color: #ff006e;
		}
		
		.alert-warning {
			border-left-color: #ff8800;
			color: #ff8800;
		}
		
		.alert-info {
			border-left-color: var(--cyber-cyan);
			color: var(--cyber-cyan);
		}
		
		/* Links */
		a {
			color: var(--cyber-cyan);
			transition: color 0.3s ease;
		}
		
		a:hover {
			color: var(--cyber-magenta);
			text-decoration: none;
		}
		
		/* Badges */
		.badge {
			border-radius: 0;
			font-family: "Rajdhani", sans-serif;
			font-weight: 700;
			letter-spacing: 1px;
		}
		
		.badge-primary {
			background: linear-gradient(135deg, var(--cyber-cyan), var(--cyber-blue));
			color: #000;
		}
		
		.badge-success {
			background: #00ff88;
			color: #000;
		}
		
		.badge-danger {
			background: #ff006e;
			color: #fff;
		}
		
		/* Modals */
		.modal-content {
			background: linear-gradient(135deg, var(--cyber-dark) 0%, var(--cyber-grid) 100%);
			border: 2px solid var(--cyber-cyan);
			border-radius: 0;
			color: var(--cyber-text);
		}
		
		.modal-header {
			background: linear-gradient(135deg, var(--cyber-grid) 0%, var(--cyber-dark) 100%);
			border-bottom: 2px solid var(--cyber-cyan);
			color: var(--cyber-cyan);
		}
		
		.modal-title {
			font-family: "Rajdhani", sans-serif;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 2px;
		}
		
		.modal-footer {
			border-top: 2px solid rgba(0, 217, 255, 0.3);
		}
		
		/* Jumbotron */
		.jumbotron {
			background: linear-gradient(135deg, var(--cyber-dark) 0%, var(--cyber-grid) 100%);
			border-bottom: 3px solid var(--cyber-cyan);
			border-radius: 0;
			color: var(--cyber-text);
			position: relative;
		}
		
		.jumbotron::before {
			content: "";
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: 
				linear-gradient(45deg, transparent 48%, rgba(0, 217, 255, 0.1) 49%, rgba(0, 217, 255, 0.1) 51%, transparent 52%),
				linear-gradient(-45deg, transparent 48%, rgba(255, 0, 255, 0.1) 49%, rgba(255, 0, 255, 0.1) 51%, transparent 52%);
			background-size: 40px 40px;
			opacity: 0.3;
			pointer-events: none;
		}
		
		.jumbotron h1 {
			color: var(--cyber-cyan);
			font-family: "Rajdhani", sans-serif;
			text-shadow: 0 0 20px rgba(0, 217, 255, 0.8);
		}
		
		/* Navbar Override */
		.navbar {
			background: rgba(10, 10, 20, 0.95) !important;
			border-bottom: 2px solid var(--cyber-cyan);
		}
		
		/* Responsive */
		@media (max-width: 768px) {
			main {
				padding-top: 3rem;
			}
		}
		
		/* Text Colors */
		.text-muted {
			color: rgba(224, 244, 255, 0.6) !important;
		}
		
		.text-primary {
			color: var(--cyber-cyan) !important;
		}
		
		.text-success {
			color: #00ff88 !important;
		}
		
		.text-danger {
			color: #ff006e !important;
		}
		
		.text-warning {
			color: #ff8800 !important;
		}
		
		/* Background Colors */
		.bg-dark {
			background: linear-gradient(135deg, var(--cyber-dark) 0%, var(--cyber-grid) 100%) !important;
		}
		
		.bg-primary {
			background: linear-gradient(135deg, var(--cyber-cyan) 0%, var(--cyber-blue) 100%) !important;
		}
		
		/* List Groups */
		.list-group-item {
			background: linear-gradient(135deg, var(--cyber-dark) 0%, var(--cyber-grid) 100%);
			border: 1px solid rgba(0, 217, 255, 0.3);
			color: var(--cyber-text);
		}
		
		.list-group-item:hover {
			background: rgba(0, 217, 255, 0.1);
		}
		
		/* Pagination */
		.pagination .page-link {
			background: rgba(10, 10, 20, 0.8);
			border: 2px solid rgba(0, 217, 255, 0.3);
			color: var(--cyber-cyan);
			border-radius: 0;
		}
		
		.pagination .page-link:hover {
			background: var(--cyber-cyan);
			color: #000;
			border-color: var(--cyber-cyan);
		}
		
		.pagination .page-item.active .page-link {
			background: linear-gradient(135deg, var(--cyber-cyan), var(--cyber-blue));
			border-color: var(--cyber-cyan);
			color: #000;
		}
		
		/* Dropdowns */
		.dropdown-menu {
			background: linear-gradient(135deg, var(--cyber-dark) 0%, var(--cyber-grid) 100%);
			border: 2px solid var(--cyber-cyan);
			border-radius: 0;
		}
		
		.dropdown-item {
			color: var(--cyber-text);
		}
		
		.dropdown-item:hover {
			background: rgba(0, 217, 255, 0.1);
			color: var(--cyber-cyan);
		}
	</style>
	
	<script type="text/javascript">
		var init = {
			'urlRoot': "{{ request.script_root }}",
			'csrfNonce': "{{ Session.nonce }}",
			'userMode': "{{ Configs.user_mode }}",
			'userId': {{ Session.id }},
			'userName': {{ User.name | tojson }},
			'userEmail': {{ User.email | tojson }},
			'teamId': {{ Team.id | tojson }}, 
			'teamName': {{ Team.name | tojson }},
			'start': {{ Configs.start | tojson }},
			'end': {{ Configs.end | tojson }},
			'theme_settings': {{ Configs.theme_settings | tojson }}
		}
	</script>
	{{ Configs.theme_header }}
</head>
<body{% if request.path == '/' or request.path == '/index' %} class="index-page"{% endif %}>
	{% include "components/navbar.html" %}

	<main role="main">
		{% block content %}
		{% endblock %}
	</main>

	
	<!-- Core Scripts -->
	<script defer src="{{ url_for('views.themes', path='js/vendor.bundle.js') }}"></script>
	<script defer src="{{ url_for('views.themes', path='js/core.js') }}"></script>
	<script defer src="{{ url_for('views.themes', path='js/helpers.js') }}"></script>

	{% block entrypoint %}
	<script defer src="{{ url_for('views.themes', path='js/pages/main.js') }}"></script>
	{% endblock %}

	{% block scripts %}
	{% endblock %}

	{{ Plugins.scripts }}

	{{ Configs.theme_footer }}
</body>
</html>
